<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrum Poker - System Audit Logs</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2244%22 fill=%22%23c0392b%22 stroke=%22%23fff%22 stroke-width=%228%22 stroke-dasharray=%2210 6%22 /><circle cx=%2250%22 cy=%2250%22 r=%2230%22 fill=%22%23fff%22 /><circle cx=%2250%22 cy=%2250%22 r=%2222%22 fill=%22%23c0392b%22 /></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script>
    // Route guard: only allow the Administrator (Ankor) to inspect logs
    if (sessionStorage.getItem('isLoggedIn') !== 'true' || sessionStorage.getItem('userName') !== 'Ankor') {
      alert('Access Denied. Only the Administrator (Ankor) can view system logs.');
      window.location.href = '/';
    }
  </script>
</head>
<body class="theme-dark" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 2rem;">
  
  <div class="dealer-logs-card glass-poker" style="max-width: 1040px !important; width: 100%; height: 80vh; display: flex; flex-direction: column; justify-content: space-between;">
    <header class="logs-header" style="flex-shrink: 0;">
      <div class="logs-header-title">
        <span class="logo-icon" style="font-size: 1.75rem;">📜</span>
        <h2 style="font-family: 'Outfit', sans-serif; font-size: 1.5rem; color: #fff; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">System Activity Logs</h2>
      </div>
      <div style="display: flex; gap: 0.5rem;">
        <button id="btn-refresh" class="btn btn-secondary btn-xs">Refresh Logs</button>
        <a href="/" class="btn btn-gold btn-xs btn-glow" style="text-decoration: none; display: inline-flex; align-items: center;">Back to Poker Table</a>
      </div>
    </header>

    <div id="logs-container" class="logs-container" style="flex-grow: 1; margin: 1rem 0; background: rgba(3, 17, 10, 0.96); max-height: none;">
      <pre id="logs-content" class="logs-content">Loading activity history...</pre>
    </div>

    <footer style="flex-shrink: 0; text-align: center; font-size: 0.8rem; color: var(--text-secondary); border-top: 1px solid rgba(212, 175, 55, 0.15); padding-top: 0.75rem; margin-top: 0.5rem;">
      Scrum Poker Console logs are saved securely on the server.
    </footer>
  </div>

  <script>
    const logsContent = document.getElementById('logs-content');
    const logsContainer = document.getElementById('logs-container');
    const btnRefresh = document.getElementById('btn-refresh');

    // Build socket connection URL
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    let host = window.location.host;
    if (host.includes('localhost')) {
      host = '127.0.0.1:3000';
    }
    const wsUrl = `${protocol}//${host}`;
    let socket;

    function connect() {
      socket = new WebSocket(wsUrl);

      socket.onopen = () => {
        console.log('Logs websocket open.');
        requestLogs();
      };

      socket.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          if (message.type === 'logs') {
            logsContent.textContent = message.data;
            logsContainer.scrollTop = logsContainer.scrollHeight;
          }
        } catch (e) {
          console.error('Failed to parse logs message:', e);
        }
      };

      socket.onclose = () => {
        console.warn('Logs socket disconnected, attempting reconnect in 3s...');
        setTimeout(connect, 3000);
      };

      socket.onerror = (err) => {
        console.error('Logs socket error:', err);
      };
    }

    function requestLogs() {
      if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(JSON.stringify({ type: 'getLogs' }));
      }
    }

    btnRefresh.addEventListener('click', requestLogs);
    connect();
  </script>
</body>
</html>
